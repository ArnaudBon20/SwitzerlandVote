name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rebuild dataset
        run: |
          python scripts/build_data.py \
            --input data/source/recommandations-de-vote-des-partis.xlsx \
            --output data/votes.json \
            --refresh-bk-results \
            --recent-year-window 2

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site bundle
        run: |
          rm -rf _site
          mkdir -p _site/data
          cp index.html styles.css theme.css app.js .nojekyll _site/
          cp solid-state-proposal.html _site/
          cp -R templates _site/templates
          cp data/votes.json _site/data/votes.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
