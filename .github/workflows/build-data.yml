name: Build Dataset

on:
  pull_request:
    paths:
      - "data/source/**"
      - "scripts/build_data.py"
      - ".github/workflows/build-data.yml"
  push:
    branches:
      - main
    paths:
      - "data/source/**"
      - "scripts/build_data.py"
      - ".github/workflows/build-data.yml"

jobs:
  regenerate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate JSON dataset
        run: |
          python scripts/build_data.py \
            --input data/source/recommandations-de-vote-des-partis.xlsx \
            --output data/votes.json \
            --refresh-bk-results \
            --recent-year-window 2

      - name: Ensure committed dataset is up to date
        run: |
          git diff -- data/votes.json
          python - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          current = json.loads(Path("data/votes.json").read_text(encoding="utf-8"))
          committed = json.loads(
              subprocess.check_output(["git", "show", "HEAD:data/votes.json"], text=True)
          )

          current.pop("generatedAt", None)
          committed.pop("generatedAt", None)

          if current != committed:
              raise SystemExit("Dataset drift detected (excluding generatedAt).")
          PY
